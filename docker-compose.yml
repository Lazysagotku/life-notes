services:
  postgres:
    image: postgres:16-alpine
    container_name: lifenotes-db
    environment:
      POSTGRES_DB: lifenotes
      POSTGRES_USER: lifenotes
      POSTGRES_PASSWORD: lifenotes123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifenotes -d lifenotes"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
